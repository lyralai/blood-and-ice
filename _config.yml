title: Ice and Blood
description: A dark fantasy trilogy — Book One ("Wild Boy"), chapter-by-chapter reading, and reference docs.
theme: jekyll-theme-midnight
markdown: kramdown
kramdown:
  parse_block_html: true
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
exclude:
  - docs/continuity/
  - docs/review/
